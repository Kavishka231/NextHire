<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — NextHire</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">
<nav>
  <a class="logo brand-mark" href="/"><span class="brand-icon">N</span>NextHire</a>
  <div class="nav-actions">
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark and light theme">
      <span class="toggle-sun" aria-hidden="true"></span>
      <span class="toggle-moon" aria-hidden="true"></span>
    </button>
    <a href="/login.html">Login</a>
  </div>
</nav>
<div class="form-box auth-shell">
    <span class="eyebrow">Account recovery</span>
    <h2>Reset your password</h2>
    <p class="auth-copy">Enter your email and we'll send you a reset link.</p>

    <div id="alertBox" class="alert"></div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email" />
      </div>
      <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--slate-500)">
      <a href="/login.html">← Back to sign in</a>
    </p>

</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  initThemeToggle();
  initForgotPassword();
</script>
</body>
</html>
