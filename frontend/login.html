<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">

<nav>
  <a class="logo brand-mark" href="/"><span class="brand-icon">N</span>NextHire</a>
  <div class="nav-actions">
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark and light theme">
      <span class="toggle-sun" aria-hidden="true"></span>
      <span class="toggle-moon" aria-hidden="true"></span>
    </button>
    <a href="/register.html">Create account</a>
  </div>
</nav>

<div class="form-box auth-shell">
  <span class="eyebrow">Welcome back</span>
  <h2>Login</h2>
  <p class="auth-copy">Sign in to manage your job search pipeline.</p>
  <div id="alertBox" class="alert"></div>

  <form id="loginForm">
    <input name="email" id="email" type="email" placeholder="Email" required>
    <div class="password-field">
      <input name="password" id="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button class="toggle-password" type="button" data-target="password" aria-label="Show password">Show</button>
    </div>

    <button class="btn" type="submit">Login</button>
  </form>
  <p class="auth-switch">New to NextHire? <a href="/register.html">Create an account</a></p>
  <p class="auth-switch"><a href="/forgot-password.html">Forgot password?</a></p>
</div>

<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  initThemeToggle();
  initLogin();
</script>
</body>
</html>
